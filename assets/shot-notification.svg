<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 820" width="400" height="820" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#3b4d7a"/><stop offset="0.5" stop-color="#222c4d"/><stop offset="1" stop-color="#10152e"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37bbfe"/><stop offset="1" stop-color="#007dbb"/>
    </linearGradient>
    <clipPath id="screen"><rect x="22" y="22" width="356" height="776" rx="46"/></clipPath>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="380" height="800" rx="58" fill="#0b0b0e"/>
  <rect x="13" y="13" width="374" height="794" rx="55" fill="#000"/>

  <g clip-path="url(#screen)">
    <rect x="22" y="22" width="356" height="776" fill="url(#wall)"/>

    <!-- status bar -->
    <text x="50" y="55" fill="#fff" font-size="15" font-weight="600">9:41</text>
    <g fill="#fff">
      <rect x="300" y="47" width="3" height="7" rx="1"/><rect x="305" y="44" width="3" height="10" rx="1"/>
      <rect x="310" y="41" width="3" height="13" rx="1"/><rect x="315" y="38" width="3" height="16" rx="1"/>
      <path d="M326 47a8 8 0 0 1 16 0z"/>
      <rect x="346" y="41" width="20" height="11" rx="3.2" fill="none" stroke="#fff" stroke-width="1.4"/>
      <rect x="348" y="43" width="14" height="7" rx="1.5"/><rect x="367" y="44" width="1.6" height="5" rx="0.8"/>
    </g>
    <rect x="158" y="33" width="84" height="27" rx="13.5" fill="#000"/>

    <!-- date + clock -->
    <text x="200" y="150" text-anchor="middle" fill="#cfd8f7" font-size="16" opacity="0.9">понедельник, 16 июня</text>
    <text x="200" y="232" text-anchor="middle" fill="#fff" font-size="86" font-weight="600" letter-spacing="-3">9:41</text>

    <!-- notification 1 (base-mode message: real "MAX | …" prefix) -->
    <g filter="url(#sh)"><rect x="42" y="436" width="316" height="112" rx="24" fill="#fff" fill-opacity="0.17"/></g>
    <rect x="42" y="436" width="316" height="112" rx="24" fill="#fff" fill-opacity="0.06"/>
    <circle cx="74" cy="468" r="17" fill="url(#tg)"/>
    <g transform="translate(62.5,456.5) scale(0.96)" fill="#fff"><path d="M21.9 4.8c.27-1.2-.43-1.66-1.2-1.37L2.5 10.3c-1.23.47-1.2 1.16-.2 1.47l4.65 1.45 10.8-6.8c.5-.33.96-.15.58.18l-8.74 7.9-.34 4.83c.48 0 .69-.2.94-.45l2.26-2.17 4.7 3.46c.86.48 1.48.23 1.7-.8l3.07-14.5z"/></g>
    <text x="100" y="464" fill="#fff" font-size="12" font-weight="600" opacity="0.8" letter-spacing="0.6">TELEGRAM</text>
    <text x="340" y="464" text-anchor="end" fill="#fff" font-size="12" opacity="0.62">сейчас</text>
    <text x="100" y="487" fill="#fff" font-size="13.5" font-weight="700">MAX | Ольга Лебедева (чат 148440672)</text>
    <text x="100" y="510" fill="#fff" font-size="14.5" opacity="0.95">Привет! Освободилась — ты где? 😊</text>
    <text x="100" y="532" fill="#fff" font-size="14.5" opacity="0.95">Поехали в кафе на углу? ☕️</text>

    <!-- notification 2 (voice note: real label) -->
    <rect x="42" y="560" width="316" height="92" rx="24" fill="#fff" fill-opacity="0.13"/>
    <circle cx="74" cy="590" r="17" fill="url(#tg)"/>
    <g transform="translate(62.5,578.5) scale(0.96)" fill="#fff"><path d="M21.9 4.8c.27-1.2-.43-1.66-1.2-1.37L2.5 10.3c-1.23.47-1.2 1.16-.2 1.47l4.65 1.45 10.8-6.8c.5-.33.96-.15.58.18l-8.74 7.9-.34 4.83c.48 0 .69-.2.94-.45l2.26-2.17 4.7 3.46c.86.48 1.48.23 1.7-.8l3.07-14.5z"/></g>
    <text x="100" y="586" fill="#fff" font-size="12" font-weight="600" opacity="0.8" letter-spacing="0.6">TELEGRAM</text>
    <text x="340" y="586" text-anchor="end" fill="#fff" font-size="12" opacity="0.62">5 мин</text>
    <text x="100" y="609" fill="#fff" font-size="13.5" font-weight="700">MAX | Иван Петров (чат 90217734)</text>
    <text x="100" y="632" fill="#fff" font-size="14.5" opacity="0.95">🎤 Голосовое (12 с) — открыть в MAX</text>

    <!-- flashlight / camera -->
    <circle cx="70" cy="742" r="24" fill="#000" fill-opacity="0.28"/>
    <circle cx="330" cy="742" r="24" fill="#000" fill-opacity="0.28"/>
    <path d="M66 734h8l-1.5 12h-5z" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>
    <g transform="translate(322,734)" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"><rect x="0" y="3" width="16" height="12" rx="3"/><circle cx="8" cy="9" r="3.2"/></g>

    <rect x="148" y="782" width="104" height="5" rx="2.5" fill="#fff" opacity="0.9"/>
  </g>
</svg>
